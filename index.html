<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Evolution Presentation Shell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg-deep: #05060b;
            --panel-bg: #0a0c14;
            --accent-cyan: #00f2ff;
        }

        body {
            background-color: var(--bg-deep);
            color: white;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
        }

        .nav-button.active {
            background: rgba(0, 242, 255, 0.15);
            border-color: rgba(0, 242, 255, 0.5);
            color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        iframe {
            border: none;
            width: 100%;
            height: 100%;
            transition: opacity 0.3s ease;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .loading-overlay.visible {
            opacity: 1;
        }
    </style>
</head>
<body class="flex flex-col h-screen w-full">

    <!-- Top Navigation Bar -->
    <header class="h-20 w-full flex items-center justify-between px-8 border-b border-white/10 bg-[#0a0c14] z-50">
        <div class="flex items-center gap-4">
            <!-- Brain/Core Icon -->
            <div class="p-2 rounded-lg bg-cyan-500/10 border border-cyan-500/30">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-cyan-400">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="8" y1="21" x2="16" y2="21"></line>
                    <line x1="12" y1="17" x2="12" y2="21"></line>
                </svg>
            </div>
            <div>
                <h1 class="text-lg font-bold tracking-widest uppercase italic">AI Evolution</h1>
                <p id="current-title" class="text-[10px] text-slate-500 font-mono uppercase tracking-widest">Standardizing Agency</p>
            </div>
        </div>

        <nav class="flex gap-2" id="era-nav">
            <button onclick="loadEra(1, 'scenario4.html', 'Standardizing Agency')" class="nav-button active px-5 py-2 rounded border border-white/5 bg-white/5 text-[10px] font-bold tracking-widest hover:bg-white/10 transition-all">Scenario</button>
            <button onclick="loadEra(2, 'era1.html', 'Manual Isolation')" class="nav-button px-5 py-2 rounded border border-white/5 bg-white/5 text-[10px] font-bold tracking-widest hover:bg-white/10 transition-all">ERA 1</button>
            <button onclick="loadEra(3, 'era2.html', 'Rigid Scripting')" class="nav-button px-5 py-2 rounded border border-white/5 bg-white/5 text-[10px] font-bold tracking-widest hover:bg-white/10 transition-all">ERA 2</button>
            <button onclick="loadEra(4, 'era3-v7.html', 'Hard-Coded Silos')" class="nav-button px-5 py-2 rounded border border-white/5 bg-white/5 text-[10px] font-bold tracking-widest hover:bg-white/10 transition-all">ERA 3</button>
            <button onclick="loadEra(5, 'era4.html', 'Reflex Arc (MCP)')" class="nav-button px-5 py-2 rounded border border-white/5 bg-white/5 text-[10px] font-bold tracking-widest hover:bg-white/10 transition-all">ERA 4</button>
        </nav>
    </header>

    <!-- Main Viewport Container -->
    <main class="flex-1 relative bg-black">
        <div id="loader" class="loading-overlay">
            <div class="flex flex-col items-center gap-4">
                <div class="w-8 h-8 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
                <span class="text-[10px] uppercase tracking-[0.3em] text-cyan-500">Syncing Node...</span>
            </div>
        </div>
        
        <!-- The Frame that loads your separate HTML files -->
        <iframe id="view-frame" src="scenario4.html"></iframe>
    </main>

    <!-- Footer Controls -->
    <!--<footer class="h-12 w-full px-8 flex items-center justify-between border-t border-white/5 bg-[#0a0c14] text-[9px] text-slate-500 uppercase tracking-widest">
        <div>System Status: <span class="text-green-500">Operational</span></div>
        <div class="flex gap-4">
            <span id="file-status">Currently Viewing: scenario4.html</span>
            <span class="opacity-50">Model Context Protocol v1.0</span>
        </div>
    </footer>-->

    <script>
        const iframe = document.getElementById('view-frame');
        const loader = document.getElementById('loader');
        const titleLabel = document.getElementById('current-title');
        const fileStatus = document.getElementById('file-status');
        const navButtons = document.querySelectorAll('.nav-button');

        function loadEra(index, fileName, title) {
            // Show loader
            loader.classList.add('visible');
            iframe.style.opacity = '0';

            // Update UI State
            titleLabel.innerText = title;
            // fileStatus.innerText = `Currently Viewing: ${fileName}`;
            
            // Update Active Button
            navButtons.forEach((btn, i) => {
                if (i === index - 1) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            // Change Iframe Source
            // Adding a small delay to simulate neural loading and ensure smooth transition
            setTimeout(() => {
                iframe.src = fileName;
            }, 300);
        }

        // Hide loader when iframe finishes loading
        iframe.onload = function() {
            loader.classList.remove('visible');
            iframe.style.opacity = '1';
        };

        // Error handling for missing files
        iframe.onerror = function() {
            console.error("Failed to load: " + iframe.src);
            loader.innerHTML = `<div class="text-red-500 font-bold uppercase tracking-widest">Node Not Found: ${iframe.src}</div>`;
        };
    </script>
</body>
</html>
