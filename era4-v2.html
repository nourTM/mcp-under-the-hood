<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The MCP Reflex Arc: Biological Orchestration</title>
    <style>
        :root {
            --bg-color: #05060b;
            --cyan: #00f2ff;
            --amber: #ffab00;
            --red: #ff3e3e;
            --violet: #9d00ff;
            --green: #00ff88;
            --gold: #ffd700;
            --grey-hud: #1a1c23;
            --text-dim: #888fb0;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            color: white;
            user-select: none;
        }

        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas { display: block; width: 100%; height: 100%; cursor: grab; }
        canvas:active { cursor: grabbing; }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            transition: opacity 1.5s ease-in-out;
            opacity: 0; 
        }
        .ui-layer.visible {
            opacity: 1;
        }
        .header {
            position: absolute;
            top: 30px;
            left: 40px;
            pointer-events: auto;
        }

        .header h1 {
            margin: 0;
            font-size: 1.3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--cyan);
            border-left: 4px solid var(--cyan);
            padding-left: 15px;
        }

        .status-badge {
            position: absolute;
            top: 35px;
            right: 40px;
            padding: 10px 20px;
            background: rgba(15, 18, 25, 0.8);
            border-radius: 6px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 10px var(--green);
        }

                /* Change or add this in your <style> block */
        .nav-controls {
            position: absolute;
            bottom: 90px;
            right: 40px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none; /* Let clicks pass through since buttons are gone */
        }

        .nav-btn {
            background: rgba(15, 18, 25, 0.8);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            font-weight: bold;
        }

        .nav-btn:hover { border-color: var(--cyan); background: rgba(0, 242, 255, 0.15); }

        .hint-text {
            color: var(--amber);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: right;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .hint-text.visible { opacity: 1; }

        /* Enhanced Timeline for Presentation */
        /* Presentation-Ready Footer */
        .timeline {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px; /* Taller area for text visibility */
            background: rgba(10, 12, 18, 0.95); /* Solid dark plate for contrast */
            display: flex;
            justify-content: space-between;
            align-items: flex-end; /* Align markers to the bottom */
            padding: 0 40px; /* FIX: Prevents truncation on edges */
            box-sizing: border-box;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: auto;
        }

        .timeline-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px; /* The actual moving bar */
            background: linear-gradient(90deg, var(--cyan), var(--amber));
            width: 0%;
            transition: width 1.2s cubic-bezier(0.65, 0, 0.35, 1);
            box-shadow: 0 -2px 10px rgba(0, 242, 255, 0.4);
            z-index: 1;
        }

        .timeline-step {
            position: relative;
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        /* The Label - Optimized for Presentation */
        .timeline-step::after {
            content: attr(data-label);
            font-size: 0.75rem; /* Larger text */
            font-weight: 800;   /* Extra bold */
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.4s ease;
            padding-bottom: 5px;
        }

        /* Active State */
        .timeline-step.active::after {
            color: white;
            text-shadow: 0 0 10px var(--cyan);
            transform: translateY(-2px);
        }

        /* Vertical Marker Tick */
        .timeline-step::before {
            content: '';
            width: 2px;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            margin-top: auto; /* Push to bottom */
        }

        .timeline-step.active::before {
            background: var(--amber);
        }
        .interact-guide {
            position: absolute;
            bottom: 35px;
            left: 40px;
            font-size: 0.6rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>

    function roundRect(ctx, x, y, width, height, radius) {
        ctx.beginPath(); ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

 function drawSpineIcon(x, y, size, isHorizontal = true, scale = 1.0, rotation = 0) {
    ctx.save();
    ctx.translate(x, y);
    
    // Convert degrees to radians and apply rotation
    ctx.rotate(rotation * Math.PI / 180);
    ctx.scale(scale, scale);

    // 1. Define S-Curve Path
    const p0 = { x: -size / 2, y: 0 };
    const cp1 = { x: -size / 4, y: -180 }; 
    const cp2 = { x: size / 4, y: 180 };   
    const p1 = { x: size / 2, y: 0 };

    const vCount = 26; 

    function getBezier(t, p0, cp1, cp2, p1) {
        const cx = 3 * (cp1.x - p0.x), bx = 3 * (cp2.x - cp1.x) - cx, ax = p1.x - p0.x - cx - bx;
        const cy = 3 * (cp1.y - p0.y), by = 3 * (cp2.y - cp1.y) - cy, ay = p1.y - p0.y - cy - by;
        return {
            x: ax * t**3 + bx * t**2 + cx * t + p0.x,
            y: ay * t**3 + by * t**2 + cy * t + p0.y
        };
    }

    // 2. Draw Glow Layer
    ctx.shadowBlur = 15;
    ctx.shadowColor = COLORS.cyan;
    ctx.strokeStyle = "rgba(0, 242, 255, 0.4)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    
    // If you specifically want the vertical 'logic' but tilted, 
    // keep the rotation outside. If you want it horizontal but slanted:
    if (!isHorizontal) ctx.rotate(Math.PI / 2);
    
    ctx.moveTo(p0.x, p0.y);
    ctx.bezierCurveTo(cp1.x, cp1.y, cp2.x, cp2.y, p1.x, p1.y);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // 3. Draw Vertebrae
    for (let i = 0; i < vCount; i++) {
        const t = i / (vCount - 1);
        const pos = getBezier(t, p0, cp1, cp2, p1);
        const nextPos = getBezier(Math.min(t + 0.01, 1), p0, cp1, cp2, p1);
        const angle = Math.atan2(nextPos.y - pos.y, nextPos.x - pos.x);

        ctx.save();
        ctx.translate(pos.x, pos.y);
        ctx.rotate(angle); 

        const sizeScale = 1 - Math.pow(Math.abs(t - 0.5), 2) * 1.2;
        const vw = (60 + Math.sin(t * 8) * 15) * sizeScale;
        const vh = 12;

        const grad = ctx.createLinearGradient(0, -vw/2, 0, vw/2);
        grad.addColorStop(0, "#ffffff");
        grad.addColorStop(0.5, COLORS.cyan); 
        grad.addColorStop(1, "#ffffff");

        ctx.fillStyle = grad;
        roundRect(ctx, -vh/2, -vw/2, vh, vw, 6);
        ctx.fill();

        // 4. MCP Nerves
        if (i % 4 === 0) {
            ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(20, -vw * 1.2, 50, -vw * 1.8);
            ctx.stroke();
            ctx.fillStyle = COLORS.cyan;
            ctx.beginPath();
            ctx.arc(50, -vw * 1.8, 4, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }
    ctx.restore();
}

        // --- ILLUSTRATIVE HELPERS ---

    function drawBrainIcon(x, y, s) {
        ctx.save(); ctx.translate(x, y);
        
        // Outer glow
        ctx.shadowBlur = 40; ctx.shadowColor = COLORS.violet;
        ctx.fillStyle = COLORS.violet;
        ctx.globalAlpha = 0.15;
        
        // Detailed Anatomical Lobes
        const drawLobe = (cx, cy, rx, ry, rot) => {
            ctx.beginPath();
            ctx.ellipse(cx, cy, rx, ry, rot, 0, Math.PI * 2);
            ctx.fill();
        };

        // Frontal & Parietal
        drawLobe(-s*0.15, -s*0.1, s*0.35, s*0.25, -Math.PI/6);
        drawLobe(s*0.15, -s*0.1, s*0.35, s*0.25, Math.PI/6);
        // Temporal
        drawLobe(-s*0.2, s*0.15, s*0.25, s*0.2, Math.PI/8);
        drawLobe(s*0.2, s*0.15, s*0.25, s*0.2, -Math.PI/8);
        
        // Inner Neural Grid Overlay
        ctx.strokeStyle = COLORS.violet;
        ctx.globalAlpha = 0.3;
        ctx.lineWidth = 1;
        for(let i=0; i<10; i++) {
            ctx.beginPath();
            ctx.moveTo(-s*0.4, -s*0.3 + i*s*0.06);
            ctx.lineTo(s*0.4, -s*0.3 + i*s*0.06);
            ctx.stroke();
        }

        // Synaptic Core
        ctx.globalAlpha = 0.6;
        ctx.fillStyle = 'white';
        ctx.shadowBlur = 20; ctx.shadowColor = 'white';
        ctx.beginPath();
        ctx.arc(0, 0, s*0.05 + Math.sin(frame*0.05)*5, 0, Math.PI*2);
        ctx.fill();

        ctx.restore();
    }

    function drawLimbIcon(x, y, s) {
        ctx.save(); ctx.translate(x, y);
        
        ctx.strokeStyle = COLORS.gold;
        ctx.fillStyle = COLORS.gold;
        ctx.lineWidth = 15;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.globalAlpha = 0.3;

        // Base/Shoulder
        ctx.beginPath();
        ctx.arc(-s/2.5, 0, 40, 0, Math.PI*2);
        ctx.stroke();

        // Upper Arm
        ctx.beginPath();
        ctx.moveTo(-s/2.5, 0);
        ctx.lineTo(-s/6, -s/4);
        ctx.stroke();

        // Elbow Joint
        ctx.beginPath();
        ctx.arc(-s/6, -s/4, 25, 0, Math.PI*2);
        ctx.fill();

        // Forearm
        ctx.beginPath();
        ctx.moveTo(-s/6, -s/4);
        ctx.lineTo(s/6, -s/8);
        ctx.stroke();

        // Wrist Joint
        ctx.beginPath();
        ctx.arc(s/6, -s/8, 15, 0, Math.PI*2);
        ctx.fill();

        // Articulated Hand/Tool
        ctx.lineWidth = 8;
        // Gripper Top
        ctx.beginPath();
        ctx.moveTo(s/6, -s/8);
        ctx.quadraticCurveTo(s/3, -s/4, s/2, -s/6);
        ctx.stroke();
        // Gripper Bottom
        ctx.beginPath();
        ctx.moveTo(s/6, -s/8);
        ctx.quadraticCurveTo(s/3, 0, s/2, -s/12);
        ctx.stroke();

        // Hydraulics/Wires
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-s/2.5, 10);
        ctx.bezierCurveTo(-s/4, s/8, -s/10, -s/8, -s/6, -s/4 + 10);
        ctx.stroke();

        ctx.restore();
    }

    function drawBox(x, y, w, h, color, title, subtitle, radius = 12) {
        ctx.strokeStyle = color; ctx.lineWidth = 2;
        ctx.fillStyle = 'rgba(10, 12, 20, 0.7)'; 
        roundRect(ctx, x, y, w, h, radius); ctx.fill(); ctx.stroke();
        if (title) {
            ctx.fillStyle = color;
            ctx.font = 'bold 13px monospace'; ctx.textAlign = 'center';
            ctx.fillText(title, x + w/2, y + 28);
            ctx.font = '9px monospace'; ctx.fillStyle = COLORS.textDim;
            ctx.fillText(subtitle, x + w/2, y + 46);
        }
    }

    // --- UTILITIES ---
    function spawnParticles(x, y, color, target = null) {
        for(let i=0; i<15; i++) {
            entities.particles.push({ 
                x: x, y: y, 
                vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5, 
                life: 1.0, color: color,
                target: target 
            });
        }
    }

    function createPulse(sx, sy, tx, ty, color, label, big = false, onComplete = null) {
        entities.pulses.push({ 
            x: sx, y: sy, tx, ty, color, label, progress: 0, 
            speed: big ? 0.003 : 0.006, 
            onComplete,
            isBundle: big,
            startTime: Date.now()
        });
    }

    function resize() {
        dpr = window.devicePixelRatio || 1;
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width * dpr;
        canvas.height = height * dpr;
        ctx.scale(dpr, dpr);
    }

    function updateCamera() {
        camera.x += (camera.targetX - camera.x) * (0.04 * timeScale);
        camera.y += (camera.targetY - camera.y) * (0.04 * timeScale);
        camera.scale += (camera.targetScale - camera.scale) * (0.04 * timeScale);

        entities.hubScaleX += (1.0 - entities.hubScaleX) * 0.1;
        entities.hubScaleY += (1.0 - entities.hubScaleY) * 0.1;
        entities.hubOpacity += (1.0 - entities.hubOpacity) * 0.1;
    }

    // --- INTERACTION ---
    // --- KEYBOARD NAVIGATION ---
   window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') {
            if (scene === -1) {
                setScene(0);
            } else {
                nextScene();
            }
        } else if (e.key === 'ArrowLeft') {
            if (scene === 0) {
                setScene(-1);
            } else if (scene > 0) {
                prevScene();
            }
        }
    });
    canvas.addEventListener('mousedown', (e) => { isDragging = true; lastMouseX = e.clientX; lastMouseY = e.clientY; });
    window.addEventListener('mouseup', () => { isDragging = false; });
    window.addEventListener('mousemove', (e) => {
        if (isDragging) {
            const dx = (e.clientX - lastMouseX) / camera.scale;
            const dy = (e.clientY - lastMouseY) / camera.scale;
            // Direct manipulation for panning for a responsive feel
            camera.x -= dx;
            camera.y -= dy;
            // Keep target in sync to prevent snapping back
            camera.targetX = camera.x;
            camera.targetY = camera.y;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        }
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left - width/2) / camera.scale + camera.x;
        const my = (e.clientY - rect.top - height/2) / camera.scale + camera.y;
        isMouseOverUI = (mx > spineX - 430 && mx < spineX - 180 && my > spineY - 180 && my < spineY + 380);
    });
    canvas.addEventListener('wheel', (e) => {
        if (isMouseOverUI) {
            e.preventDefault();
            entities.uiScrollOffset += e.deltaY * 0.5;
            const maxScroll = Math.max(0, entities.visibleHistory.length * 85 - 350);
            entities.uiScrollOffset = Math.max(0, Math.min(entities.uiScrollOffset, maxScroll));
        } else {
            e.preventDefault(); // Prevent default page scroll

            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // Get mouse position in world space before zoom
            const worldXBefore = (mouseX - width / 2) / camera.scale + camera.x;
            const worldYBefore = (mouseY - height / 2) / camera.scale + camera.y;

            // Apply zoom instantly and update target
            const scaleFactor = (1 - e.deltaY * 0.001);
            camera.scale *= scaleFactor;
            camera.scale = Math.max(0.1, Math.min(camera.scale, 3.0));
            camera.targetScale = camera.scale;

            // Get mouse position in world space after zoom and calculate the difference
            const worldXAfter = (mouseX - width / 2) / camera.scale + camera.x;
            const worldYAfter = (mouseY - height / 2) / camera.scale + camera.y;

            // Adjust camera position to keep the point under the cursor stationary
            camera.x += worldXBefore - worldXAfter;
            camera.y += worldYBefore - worldYAfter;
            camera.targetX = camera.x;
            camera.targetY = camera.y;
        }
    }, { passive: false });

// --- ORCHESTRATION ---
function setScene(index) {
    scene = index; 
    subStep = 0;
    const ui = document.querySelector('.ui-layer');

    if (index === -1) {
        // THE REVEAL: Big biological icons, no tech UI
        camera.targetX = 0; camera.targetY = 100; camera.targetScale = 0.2;
        entities.iconOpacity = 0.8;
        if (ui) ui.classList.remove('visible');
    } else {
        // THE TECH: Icons shrink/move, UI fades in
        if (ui) ui.classList.add('visible');
        entities.iconOpacity = 0.3; // Subtle background/symbol opacity

        if (index === 0) { 
            camera.targetX = spineX + 170; camera.targetY = spineY + 200; camera.targetScale = 0.6; 
            if(statusText) statusText.innerText = "System Standby"; 
        }
        else if (index === 1) { camera.targetX = spineX - 250; camera.targetY = 0; camera.targetScale = 0.8; }
        else if (index === 2) { camera.targetX = -500; camera.targetY = 0; camera.targetScale = 0.8; }
        else if (index === 4) { camera.targetX = 0; camera.targetY = 0; camera.targetScale = 0.45; }
    }

    // Update Timeline - Only show progress if we are in the tech scenes
    steps.forEach((s, i) => s.classList.toggle('active', i === index));
    if (index >= 0) {
        timelineProgress.style.width = (index / (steps.length - 1)) * 100 + '%';
    } else {
        timelineProgress.style.width = '0%';
    }

    // Reset System States
    entities.guardLightning = 0; 
    entities.isThinking = false;
    entities.uiStatus = "READY"; 
    entities.uiLock = (index >= 2);
    entities.activeJSON = null;
    entities.stopFlash = false; 
    entities.semanticMatching = false;
    entities.jsonBin = []; 
    entities.pulses = []; 
    if(clickHint) clickHint.classList.remove('visible');
}

    window.nextScene = function() {
        if (scene === 0) {
            if (subStep === 0) {
                subStep = 1; camera.targetX = spineX + 100; camera.targetY = spineY - 10; camera.targetScale = 1;
                entities.systemPromptTools = "Base constraints only. [Empty Handshake]";
                setTimeout(() => { clickHint.innerText = "REVIEW DISCOVERY REQUEST"; clickHint.classList.add('visible'); }, 1000);
                return;
            } else if (subStep === 1) {
                subStep = 2; camera.targetX = spineX + 150; camera.targetScale = 1.6;
                entities.activeJSON = "// Handshake Request: tools/list\n{\n  \"jsonrpc\": \"2.0\",\n  \"method\": \"tools/list\",\n  \"id\": 1\n}";
                clickHint.innerText = "DISPATCH DISCOVERY";
                return;
            } else if (subStep === 2) {
                subStep = 3; entities.activeJSON = null; camera.targetX = 400; camera.targetScale = 0.45;
                const limbOffsets = [-240, 0, 240];
                limbOffsets.forEach((off) => createPulse(spineX + 150, spineY + 380, limbX - 120, limbY + off, COLORS.cyan, "list tools"));
                setTimeout(() => { clickHint.innerText = "REVIEW SERVER MANIFEST"; clickHint.classList.add('visible'); }, 1500);
                return;
            } else if (subStep === 3) {
                subStep = 4; camera.targetX = limbX - 120; camera.targetY = 0; camera.targetScale = 0.9;
                entities.activeJSON = "// Combined Multi-Server Response\n{\n  \"tools\": [\n    {\"name\": \"sql_query\", \"args\": {...}},\n    {\"name\": \"git_push\", \"args\": {...}},\n    {\"name\": \"weather\", \"args\": {...}}\n  ]\n}";
                clickHint.innerText = "STAPLE ALL TOOLS";
                return;
            } else if (subStep === 4) {
                subStep = 5; entities.activeJSON = null; camera.targetX = 400; camera.targetScale = 0.45;
                const limbOffsets = [-240, 0, 240];
                limbOffsets.forEach((off, i) => {
                    createPulse(limbX - 120, limbY + off, spineX + 150, spineY + 380, COLORS.violet, "Sync", false, () => {
                        if(i === 1) {
                            camera.targetX = spineX + 180; camera.targetY = spineY - 70; camera.targetScale = 1.3;
                            entities.systemPromptTools = "Discovered: sql_query, git_push, weather";
                            setTimeout(() => { setScene(1); }, 2000);
                        }
                    });
                });
                return;
            }
        }

        if (scene === 1) {
            if (subStep === 0) {
                subStep = 1; entities.uiStatus = "READY"; 
                entities.visibleHistory.push({ role: "user", text: "Query DB count." });
                setTimeout(() => {
                    createPulse(spineX - 350, spineY + 120, spineX + 110, spineY + 50, COLORS.violet, "History Sync", false, () => {
                        camera.targetX = spineX + 150; camera.targetScale = 1.3;
                        entities.internalHistory.push({ role: "user", text: "Query DB count." });
                        setTimeout(() => { clickHint.innerText = "REVIEW DIVERGENT CONFIG"; clickHint.classList.add('visible'); }, 800);
                    });
                }, 500);
                return;
            } else if (subStep === 1) {
                subStep = 2; camera.targetX = spineX + 110; camera.targetScale = 1.6;
                entities.activeJSON = "// Parallel Dispatch Payload\n// Bundle -> Brain | Config -> Guardrail\n{\n  \"messages\": [History contents...],\n  \"stop_sequences\": [\"</tool_call>\"],\n  \"max_tokens\": 4096\n}";
                clickHint.innerText = "TRANSFORM & DISPATCH";
                return;
            } else if (subStep === 2) { 
                subStep = 3; entities.activeJSON = null; camera.targetX = -500; camera.targetScale = 0.55;
                entities.hubScaleX = 0.001; entities.hubScaleY = 0.001; entities.hubOpacity = 0.2; 
                setTimeout(() => {
                    createPulse(spineX + 110, spineY + 50, brainX + 220, brainY - 15, COLORS.violet, "HISTORY BUNDLE", true, () => {
                        entities.semanticMatching = true; camera.targetX = brainX + 220; camera.targetScale = 1.3;
                        setTimeout(() => { entities.semanticMatching = false; setScene(2); }, 3000);
                    });
                    createPulse(spineX + 110, spineY + 50, brainX + 220, brainY + 150, COLORS.green, "STOP-SEQ CONFIG", false);
                }, 200);
                return;
            }
        }

        if (scene === 2) {
            if (subStep === 0) {
                subStep = 1; camera.targetX = -450; camera.targetScale = 1.1; 
                createPulse(brainX + 220, brainY, spineX - 100, spineY + 150, 'white', "token: 'Sure'", false, () => {
                    entities.visibleHistory.push({ role: "assistant", text: "Sure, let me check..." });
                    entities.internalHistory.push({ role: "assistant", text: "Sure, let me check..." });
                    setTimeout(() => { clickHint.innerText = "LLM EMITS TOOL TAG"; clickHint.classList.add('visible'); }, 1000);
                });
                return;
            } else if (subStep === 1) {
                subStep = 2; camera.targetX = brainX + 220; camera.targetScale = 1.6;
                entities.activeJSON = "// Stream Interception: <tool_call> tag found\n\"... </thought><tool_call>{\"name\": \"sql_query\"}\"";
                clickHint.innerText = "DIVERT TO BIN";
                return;
            } else if (subStep === 2) { // Tool Divert
                subStep = 3; entities.activeJSON = null; camera.targetX = -300; camera.targetScale = 1.0;
                createPulse(brainX + 220, brainY, spineX - 100, spineY + 150, COLORS.amber, "<tool_call>", false, () => {
                    entities.toolBadge = { name: "SQL DB", status: 'gray' }; 
                    setTimeout(() => {
                        createPulse(brainX + 220, brainY, spineX + 315, spineY + 240, COLORS.gold, "token: '{...}'", false, () => {
                            entities.jsonBin.push("{ \"call\": \"sql_query\" }");
                            clickHint.innerText = "DETECTION: </tool_call>"; clickHint.classList.add('visible');
                        });
                    }, 1000);
                });
                return;
            } else if (subStep === 3) { // Guardrail INTERCEPTION (Modification)
                subStep = 4; clickHint.classList.remove('visible');
                camera.targetX = -500; camera.targetScale = 1.2;
                createPulse(brainX + 220, brainY, brainX + 220, brainY + 150, COLORS.red, "STOP TOKEN", false, () => {
                    entities.stopFlash = true;
                    entities.guardLightning = 1.0;
                    spawnParticles(brainX + 220, brainY + 150, COLORS.red);
                    setTimeout(() => { setScene(3); }, 2000);
                });
                return;
            }
        }

        if (scene === 3) {
            if (subStep === 0) {
                subStep = 1; camera.targetX = spineX + 315; camera.targetScale = 1.8;
                entities.activeJSON = "// Raw Buffered Fragment\n{\n  \"call\": \"sql_query\",\n  \"arguments\": {\"query\": \"SELECT count(*)\"}\n}";
                clickHint.innerText = "WRAP INTO JSON-RPC";
                return;
            } else if (subStep === 1) {
                subStep = 2; camera.targetX = spineX + 110; camera.targetScale = 1.6;
                entities.activeJSON = "// Wrapped Protocol Envelope\n{\n  \"jsonrpc\": \"2.0\",\n  \"method\": \"tools/call\",\n  \"params\": {\"name\": \"sql_query\", ...},\n  \"id\": \"rpc_99\"\n}";
                clickHint.innerText = "DISPATCH TO SERVER";
                return;
            } else if (subStep === 2) {
                subStep = 3; entities.activeJSON = null; camera.targetX = limbX - 100; camera.targetScale = 0.55;
                createPulse(spineX + 110, spineY + 410, limbX - 120, limbY, COLORS.violet, "Wrapped Pulse", true, () => {
                    createPulse(limbX - 120, limbY, limbX + 350, limbY, COLORS.gold, "HTTP REST Call", true, () => setScene(4));
                });
                return;
            }
        }

        if (scene === 4) {
            if (subStep === 0) {
                subStep = 1; camera.targetX = limbX + 180; camera.targetScale = 1.6;
                entities.activeJSON = "// Raw Application Data\nHTTP/1.1 200 OK\n{ \"count\": 144, \"status\": \"online\" }";
                clickHint.innerText = "SEND TO SERVER";
                return;
            } else if (subStep === 1) {
                subStep = 2; entities.activeJSON = null; camera.targetX = limbX - 100; camera.targetScale = 0.7;
                createPulse(limbX + 350, limbY, limbX - 120, limbY, COLORS.gold, "HTTP 200 OK", false, () => {
                    setTimeout(() => { clickHint.innerText = "REVIEW PROTOCOL RESULT"; clickHint.classList.add('visible'); }, 500);
                });
                return;
            } else if (subStep === 2) {
                subStep = 3; camera.targetX = limbX - 120; camera.targetScale = 1.6;
                entities.activeJSON = "// JSON-RPC Compliance Envelope\n{\n  \"jsonrpc\": \"2.0\",\n  \"result\": {\"content\": [{\"text\": \"{members: 144}\"}]},\n  \"id\": \"rpc_99\"\n}";
                clickHint.innerText = "SEND TO CONDUCTOR";
                return;
            } else if (subStep === 3) {
                subStep = 4; entities.activeJSON = null; camera.targetX = 400; camera.targetScale = 0.45;
                createPulse(limbX - 120, limbY, spineX + 110, spineY + 410, COLORS.green, "JSON-RPC Result", false, () => {
                    setTimeout(() => { clickHint.innerText = "SYNC TO HISTORY HUB"; clickHint.classList.add('visible'); }, 500);
                });
                return;
            } else if (subStep === 4) {
                subStep = 5; camera.targetX = spineX + 150; camera.targetY = spineY + 50; camera.targetScale = 1.3;
                entities.internalHistory.push({ role: "tool", text: "{count: 144}" });
                if (entities.toolBadge) entities.toolBadge.status = 'green'; 
                setTimeout(() => { clickHint.innerText = "REVIEW FINAL DECISION BUNDLE"; clickHint.classList.add('visible'); }, 800);
                return;
            } else if (subStep === 5) {
                subStep = 6; camera.targetX = spineX + 110; camera.targetScale = 1.6;
                entities.activeJSON = "// Sequential Memory Bundle\n{\n  \"messages\": [USER, TOOL_RESULT],\n  \"instruction\": \"Answer concisely.\"\n}";
                clickHint.innerText = "FINAL COGNITIVE PULSE";
                return;
            } else if (subStep === 6) {
                subStep = 7; entities.activeJSON = null; camera.targetX = -500; camera.targetScale = 0.55;
                entities.hubScaleX = 0.001; entities.hubScaleY = 0.001; entities.hubOpacity = 0.2;
                createPulse(spineX + 110, spineY + 50, brainX + 220, brainY + 50, COLORS.green, "SEQUENTIAL BUNDLE", true, () => {
                    entities.isThinking = true;
                    setTimeout(() => {
                        createPulse(brainX + 220, brainY + 50, spineX - 100, spineY + 150, 'white', "Synthesis Ready", false, () => {
                            camera.targetX = spineX - 305; camera.targetY = 0; camera.targetScale = 2.0;
                            entities.uiLock = false; entities.uiStatus = "READY";
                            const msg = "Database retrieved: 144 members identified.";
                            entities.visibleHistory.push({ role: "assistant", text: msg });
                            entities.internalHistory.push({ role: "assistant", text: msg }); 
                            entities.uiScrollOffset = Math.max(0, entities.visibleHistory.length * 85 - 350);
                        });
                    }, 1500);
                });
                return;
            }
        }
    };

    window.prevScene = function() { if (scene > 0) setScene(scene - 1); };

    function init() { resize(); window.addEventListener('resize', resize); animate(); setScene(-1); }
    function animate() { frame++; updateCamera(); draw(); requestAnimationFrame(animate); }
    function draw() {
        ctx.fillStyle = COLORS.bg; ctx.fillRect(0, 0, width, height);
        ctx.save(); ctx.translate(width/2 - camera.x * camera.scale, height/2 - camera.y * camera.scale);
        ctx.scale(camera.scale, camera.scale);

        if (scene === -1) {
            // --- MODE 1: THE BIG BIOLOGICAL REVEAL ---
            // Icons are huge and centered to introduce the metaphor
            ctx.globalAlpha = entities.iconOpacity;
            drawBrainIcon(brainX + 220, brainY + 50, 800);
            drawSpineIcon(spineX, spineY + 200, 2000, true, 1.0, 50);
            drawLimbIcon(limbX + 150, limbY + 100, 800);
        } else {
            // --- MODE 2: THE TECHNICAL SYMBOLS ---
            // Icons transform into medium/small symbols next to their respective part titles
            ctx.globalAlpha = entities.iconOpacity;
            
            // Brain symbol next to LLM Engine title
            drawBrainIcon(brainX + 40, brainY - 80, 100); 
            // Small Spine symbol next to MCP Client title
            drawSpineIcon(spineX - 350, spineY + 460, 180, true, 0.4, 0);
            // Small Limb symbol next to Servers title
            drawLimbIcon(limbX - 180, limbY, 120);

            ctx.globalAlpha = 1.0;

            // --- THE BRAIN ---
            drawBox(brainX, brainY - 30, 440, 130, COLORS.violet, "🧠 BRAIN (LLM ENGINE)", "STATELESS WEIGHTS", 30);
            if (entities.semanticMatching) {
                ctx.save();
                const scanY = (frame % 80) / 80 * 110 - 20;
                ctx.strokeStyle = COLORS.cyan; ctx.setLineDash([5, 5]); ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(brainX + 20, brainY + scanY); ctx.lineTo(brainX + 420, brainY + scanY); ctx.stroke();
                entities.brainNodes.forEach(n => {
                    const dist = Math.abs((brainY + scanY) - (brainY + n.y)); n.intensity = Math.max(0, 1 - dist/50);
                    if (n.intensity > 0) { ctx.shadowBlur = 15 * n.intensity; ctx.shadowColor = COLORS.cyan; ctx.fillStyle = `rgba(0, 242, 255, ${n.intensity})`; ctx.beginPath(); ctx.arc(brainX + 220 + n.x, brainY + 30 + n.y, 3 * n.intensity, 0, Math.PI*2); ctx.fill(); }
                });
                ctx.restore();
            }
            drawBox(brainX, brainY + 150, 440, 100, COLORS.violet, "🛡️ GUARDRAIL LAYER", "STOP-SEQ MONITOR", 0);
            if(entities.stopFlash && frame % 10 < 5) { ctx.fillStyle = COLORS.red; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center'; ctx.fillText("STOP DETECTED", brainX + 220, brainY + 225); }

            // --- CHAT UI ---
            const uiX = spineX - 270; const uiY = spineY - 180; const uiW = 250; const uiH = 560;
            drawBox(uiX, uiY, uiW, uiH, "#333", "USER UI", "FEED", 8);
            ctx.save(); ctx.beginPath(); roundRect(ctx, uiX + 5, uiY + 105, uiW - 10, 380, 4); ctx.clip();
            entities.visibleHistory.forEach((h, i) => {
                const vy = uiY + 115 + (i * 85) - entities.uiScrollOffset;
                ctx.fillStyle = h.role === 'user' ? 'rgba(0, 242, 255, 0.1)' : 'rgba(0, 255, 136, 0.05)';
                roundRect(ctx, uiX + 10, vy, uiW - 20, 75, 4); ctx.fill();
                ctx.fillStyle = h.role === 'user' ? COLORS.cyan : COLORS.green; ctx.font = 'bold 8px monospace';
                ctx.textAlign = 'left'; ctx.fillText(h.role.toUpperCase(), uiX + 20, vy + 15); ctx.fillStyle = 'white'; ctx.font = '7px monospace';
                ctx.fillText(h.text.length > 55 ? h.text.substring(0, 52) + "..." : h.text, uiX + 20, vy + 35);
            });
            ctx.restore();
            if(entities.uiStatus === "THINKING") {
                const up = (Math.sin(frame * 0.1) + 1) * 0.5; ctx.fillStyle = `rgba(157, 0, 255, ${0.1 + up * 0.2})`; roundRect(ctx, uiX + 15, uiY + 60, uiW - 30, 40, 4); ctx.fill();
                ctx.fillStyle = COLORS.violet; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center'; ctx.fillText("Gemini is thinking...", uiX + uiW/2, uiY + 85);
            }
            if(entities.toolBadge) {
                ctx.fillStyle = (entities.toolBadge.status === 'green') ? COLORS.green : '#444'; roundRect(ctx, uiX + 15, uiY + uiH - 55, uiW - 30, 35, 17); ctx.fill();
                ctx.fillStyle = (entities.toolBadge.status === 'green') ? 'black' : 'white'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center'; ctx.fillText((entities.toolBadge.status === 'green' ? "✓ Ready: " : "⚙ Active: ") + entities.toolBadge.name, uiX + uiW/2, uiY + uiH - 33);
            }

            // --- HISTORY HUB ---
            ctx.save(); ctx.translate(spineX + 115, spineY + 100); ctx.scale(entities.hubScaleX, entities.hubScaleY); ctx.translate(-(spineX + 115), -(spineY + 100)); ctx.globalAlpha = entities.hubOpacity;
            drawBox(spineX , spineY - 180, 530, 560, COLORS.violet, "HISTORY HUB", "CONDUCTOR HOST", 12);
            ctx.fillStyle = 'rgba(157, 0, 255, 0.15)'; roundRect(ctx, spineX + 20, spineY - 130, 500, 100, 4); ctx.fill();
            ctx.fillStyle = COLORS.violet; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'left'; ctx.fillText("SYSTEM PROMPT (CONTEXT)", spineX + 30, spineY - 118);
            ctx.fillStyle = COLORS.cyan; ctx.font = '7px monospace'; ctx.fillText(entities.systemPromptTools, spineX + 30 , spineY - 100);
            entities.internalHistory.slice(-10).forEach((h, i) => {
                const col = h.role === 'tool' ? COLORS.green : (h.role === 'assistant' ? COLORS.amber : COLORS.textDim);
                ctx.fillStyle = col; ctx.font = '8px monospace'; ctx.fillText(`• ${h.role.toUpperCase()}: ${h.text.substring(0, 60)}`, spineX + 30, spineY - 10 + (i*35));
            });
            ctx.restore();

            drawBox(spineX + 370, spineY + 240, 130, 100, COLORS.amber, "JSON BIN", "BUFFER", 6);
            entities.jsonBin.forEach((b, i) => { ctx.fillStyle = COLORS.gold; ctx.font = '7px monospace'; ctx.textAlign = 'center'; ctx.fillText(b, spineX + 380, spineY + 295 + (i*12)); });
            drawBox(spineX - 270, spineY + 410, 810, 110, COLORS.cyan, "📡 MCP CLIENT", "DISPATCHER", 0);

            // Define the transport data
            const serverData = [
                { name: "Weather", transport: "SSE/STDIO", color: COLORS.cyan, node: "Cloud API" },
                { name: "Postgres", transport: "STDIO/SSE", color: COLORS.cyan, node: "Local DB" },
                { name: "Git", transport: "STDIO", color: COLORS.cyan, node: "Filesystem" }
            ];

            [-240, 0, 240].forEach((off, i) => {
                const data = serverData[i];
                const y = limbY + off;
                
                // 1. Draw the MCP Server Box
                drawBox(limbX - 120, y - 45, 220, 90, data.color, `${data.name} - MCP Server`, data.transport, 4);

                // 2. Draw the External Resource Box
                const appX = limbX + 180;
                drawBox(appX, y - 45, 250, 90, COLORS.gold, data.node, "EXTERNAL", 4);

                // 3. Draw the connection to the external resource
                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.4)';
                ctx.beginPath(); ctx.moveTo(limbX + 100, y); ctx.lineTo(appX, y); ctx.stroke();
                ctx.setLineDash([]);

                // 4. Draw the "Nerve" to the Spine
                ctx.strokeStyle = data.color + "4D"; 
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(limbX - 121, y);
                ctx.bezierCurveTo(limbX - 200, y - 50, spineX + 700, spineY + 200, spineX + 540, spineY + 500);
                ctx.stroke();
            });

            // --- STABILIZED HUD ---
            if(entities.activeJSON) {
                ctx.save();
                const monW = 600; const monH = 340; const monX = width/2 - monW/2; const monY = height - monH - 120;
                ctx.fillStyle = 'rgba(25, 27, 35, 0.98)'; ctx.strokeStyle = '#444'; ctx.lineWidth = 2; roundRect(ctx, monX, monY, monW, monH, 8); ctx.fill(); ctx.stroke();
                ctx.fillStyle = 'rgba(255, 255, 255, 0.03)'; roundRect(ctx, monX, monY, monW, 30, 8); ctx.fill();
                ctx.fillStyle = '#888'; ctx.font = 'bold 12px monospace'; ctx.fillText(">> TECH DIAGNOSTIC Readout", monX + 15, monY + 20);
                ctx.fillStyle = '#eee'; ctx.font = '10px monospace'; entities.activeJSON.split('\n').forEach((l, i) => ctx.fillText(l, monX + 20, monY + 55 + (i * 18)));
                ctx.restore();
            }

            // --- PULSES & PARTICLES ---
            entities.pulses.forEach((p, i) => {
                p.progress += p.speed; const curX = p.x + (p.tx - p.x) * p.progress; const curY = p.y + (p.ty - p.y) * p.progress;
                if (p.isBundle) {
                    const b = Math.sin(p.progress * Math.PI) * 15; const size = 15 + b; ctx.globalAlpha = 0.2; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(curX, curY, size + 10, 0, Math.PI*2); ctx.fill();
                    ctx.globalAlpha = 0.5; ctx.beginPath(); ctx.arc(curX, curY, size, 0, Math.PI*2); ctx.stroke();
                    ctx.save(); ctx.translate(curX, curY); ctx.rotate(frame * 0.1); ctx.fillStyle = 'white'; for(let j=0; j<4; j++) { ctx.fillRect(size/2, 0, 4, 4); ctx.rotate(Math.PI/2); } ctx.restore(); ctx.globalAlpha = 1.0;
                }
                ctx.fillStyle = 'rgba(0,0,0,0.85)'; const tWidth = ctx.measureText(p.label).width; roundRect(ctx, curX - tWidth/2 - 8, curY - 35, tWidth + 16, 20, 4); ctx.fill();
                ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(curX, curY, p.isBundle ? 10 : 7, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'white'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center'; ctx.fillText(p.label, curX, curY - 21);
                if(p.progress >= 1) { spawnParticles(curX, curY, p.color); if(p.onComplete) p.onComplete(p); entities.pulses.splice(i, 1); }
            });

            entities.particles.forEach((p, i) => {
                if (p.target) { p.x += (p.target.x - p.x) * 0.1; p.y += (p.target.y - p.y) * 0.1; } else { p.x += p.vx; p.y += p.vy; }
                p.life -= 0.015; ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 4, 4); if(p.life <= 0) entities.particles.splice(i, 1);
            });
        }

        ctx.restore();
    }
    init();
</script>
